
<svg
  width="1024"
  height="1024"
  viewBox="0 0 512 512"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <!-- Standard Solid Background for maximum clarity -->
  <circle cx="256" cy="256" r="250" fill="#FFFFFF" />
  
  <!-- Bold Outer Ring -->
  <circle cx="256" cy="256" r="230" stroke="#1E3A8A" stroke-width="20" />
  <circle cx="256" cy="256" r="215" stroke="#F97316" stroke-width="10" />

  <!-- Bold Abstract "D" / Connectivity Symbol -->
  <g id="StandardSymbol">
    <path 
      d="M170 130 V382 C170 382 350 382 350 256 C350 130 170 130 170 130Z" 
      fill="#1E3A8A" 
    />
    <path 
      d="M205 165 V347 C205 347 315 347 315 256 C315 165 205 165 205 165Z" 
      fill="#F97316" 
    />
    
    <!-- Central Node Point -->
    <circle cx="350" cy="256" r="35" fill="#1E3A8A" />
    <circle cx="350" cy="256" r="15" fill="white" />
  </g>

  <!-- High-Contrast Connectivity Dots -->
  <circle cx="256" cy="75" r="22" fill="#1E3A8A" />
  <circle cx="256" cy="437" r="22" fill="#F97316" />
  <circle cx="75" cy="256" r="22" fill="#1E3A8A" />
</svg>
