
<svg
  width="1024"
  height="1024"
  viewBox="0 0 512 512"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <!-- No background circle for true transparency -->
  
  <!-- Outer Decorative Ring (Professional Gradient-like effect using paths) -->
  <circle cx="256" cy="256" r="230" stroke="#0284C7" stroke-width="24" opacity="0.1" />
  <circle cx="256" cy="256" r="210" stroke="#EA580C" stroke-width="16" opacity="0.1" />

  <!-- Modern Abstract "D" / Digital Point Symbol -->
  <g id="MainSymbol">
    <!-- Main "D" Curve -->
    <path 
      d="M160 120 V392 C160 392 340 392 340 256 C340 120 160 120 160 120Z" 
      fill="#1E3A8A" 
    />
    
    <!-- Inner Accent for Depth -->
    <path 
      d="M190 150 V362 C190 362 300 362 300 256 C300 150 190 150 190 150Z" 
      fill="#0284C7" 
    />

    <!-- The "Digital Point" Accent -->
    <path 
      d="M220 180 V332 C220 332 260 332 260 256 C260 180 220 180 220 180Z" 
      fill="#F97316" 
    />

    <!-- Highlight Dot -->
    <circle cx="340" cy="256" r="32" fill="#F97316" />
    <circle cx="340" cy="256" r="12" fill="white" />
  </g>

  <!-- Connectivity Nodes -->
  <circle cx="256" cy="80" r="20" fill="#0284C7" />
  <circle cx="256" cy="432" r="20" fill="#EA580C" />
  <circle cx="80" cy="256" r="20" fill="#1E3A8A" />
</svg>
