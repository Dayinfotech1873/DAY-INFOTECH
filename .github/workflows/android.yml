name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Web App
        run: npm run build

      - name: Install Capacitor Android Platform
        run: |
          npm install @capacitor/android@6.2.0

      - name: Sync Web Code to Capacitor
        run: npx cap sync

      - name: Build Android App (APK)
        run: |
          cd android
          mkdir -p gradle/wrapper
          echo "Checking gradle-wrapper.jar..."
          if [ -f gradle/wrapper/gradle-wrapper.jar ]; then
            ls -la gradle/wrapper/gradle-wrapper.jar
            file gradle/wrapper/gradle-wrapper.jar
          else
            echo "gradle-wrapper.jar not found."
          fi
          
          # Force download if it looks like a pointer or is missing
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ] || [ $(stat -c%s gradle/wrapper/gradle-wrapper.jar) -lt 50000 ]; then
            echo "Downloading a clean gradle-wrapper.jar (v8.2.1)..."
            curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.2.1/gradle/wrapper/gradle-wrapper.jar
            ls -la gradle/wrapper/gradle-wrapper.jar
          fi
          
          chmod +x gradlew
          sed -i 's/\r$//' gradlew
          ./gradlew assembleDebug --stacktrace --info

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DAY-Infotech-App-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
